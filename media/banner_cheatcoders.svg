<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CheatCoders — Pivot Analytics Banner</title>
  <desc>Green hackathon banner for CheatCoders GitHub README</desc>

  <!-- Background -->
  <rect width="680" height="280" fill="#0d1f0f"/>

  <!-- Grid -->
  <g stroke="#22c55e" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="40" x2="680" y2="40"/>
    <line x1="0" y1="80" x2="680" y2="80"/>
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="0" y1="160" x2="680" y2="160"/>
    <line x1="0" y1="200" x2="680" y2="200"/>
    <line x1="0" y1="240" x2="680" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="440" y1="0" x2="440" y2="280"/>
    <line x1="520" y1="0" x2="520" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Glow -->
  <ellipse cx="340" cy="110" rx="320" ry="130" fill="#16a34a" opacity="0.06"/>

  <!-- Top border -->
  <rect x="0" y="0" width="680" height="3" fill="#22c55e" opacity="0.9"/>

  <!-- Hackathon badge top-left -->
  <rect x="20" y="14" width="180" height="20" rx="10" fill="#052e16" stroke="#166534" stroke-width="0.8"/>
  <text x="110" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">🏆 Сбер × ПРОСТО × ИТМО</text>

  <!-- Team badge top-right -->
  <rect x="480" y="14" width="180" height="20" rx="10" fill="#16a34a"/>
  <text x="570" y="28" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0fdf4" font-weight="700">CheatCoders</text>

  <!-- Pivot table decoration left -->
  <g opacity="0.18">
    <rect x="28" y="90" width="68" height="14" rx="2" fill="#22c55e"/>
    <rect x="28" y="108" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="28" y="124" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="28" y="140" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="100" y="90" width="40" height="14" rx="2" fill="#22c55e"/>
    <rect x="100" y="108" width="40" height="12" rx="2" fill="#15803d"/>
    <rect x="100" y="124" width="40" height="12" rx="2" fill="#15803d"/>
    <rect x="100" y="140" width="40" height="12" rx="2" fill="#166534"/>
  </g>

  <!-- Pivot table decoration right -->
  <g opacity="0.18">
    <rect x="584" y="90" width="68" height="14" rx="2" fill="#22c55e"/>
    <rect x="584" y="108" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="584" y="124" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="584" y="140" width="68" height="12" rx="2" fill="#16a34a"/>
    <rect x="544" y="90" width="36" height="14" rx="2" fill="#22c55e"/>
    <rect x="544" y="108" width="36" height="12" rx="2" fill="#15803d"/>
    <rect x="544" y="124" width="36" height="12" rx="2" fill="#15803d"/>
    <rect x="544" y="140" width="36" height="12" rx="2" fill="#166534"/>
  </g>

  <!-- Main title -->
  <text x="340" y="90" text-anchor="middle" font-family="monospace" font-size="13" fill="#4ade80" opacity="0.7" letter-spacing="4">КЕЙС 1</text>
  <text x="340" y="128" text-anchor="middle" font-family="monospace" font-size="36" font-weight="700" fill="#bbf7d0" letter-spacing="-1">Pivot Analytics</text>

  <!-- Subtitle -->
  <text x="340" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#86efac" opacity="0.7">до 10 млн записей · 200 атрибутов · AI-интерпретация</text>

  <!-- Divider -->
  <line x1="80" y1="172" x2="600" y2="172" stroke="#22c55e" stroke-width="0.5" opacity="0.35"/>

