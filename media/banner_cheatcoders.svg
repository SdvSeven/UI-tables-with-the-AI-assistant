  <rect x="62" y="184" width="90" height="22" rx="11" fill="#052e16" stroke="#16a34a" stroke-width="0.8"/>
  <text x="107" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">PostgreSQL 16</text>

  <rect x="164" y="184" width="100" height="22" rx="11" fill="#052e16" stroke="#16a34a" stroke-width="0.8"/>
  <text x="214" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">Spring Boot 3</text>

  <rect x="276" y="184" width="128" height="22" rx="11" fill="#052e16" stroke="#16a34a" stroke-width="0.8"/>
  <text x="340" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">React + TypeScript</text>

  <rect x="416" y="184" width="90" height="22" rx="11" fill="#052e16" stroke="#16a34a" stroke-width="0.8"/>
  <text x="461" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">Mistral LLM</text>

  <rect x="518" y="184" width="100" height="22" rx="11" fill="#16a34a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="568" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0fdf4" font-weight="700">Java 17+</text>

  <!-- Bottom link -->
  <text x="340" y="238" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.45">github.com/SdvSeven · команда CheatCoders</text>

  <!-- Bottom border -->
  <rect x="0" y="277" width="680" height="3" fill="#22c55e" opacity="0.4"/>

  <!-- Corner dots -->
  <circle cx="24" cy="252" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="36" cy="252" r="3" fill="#22c55e" opacity="0.2"/>
  <circle cx="48" cy="252" r="3" fill="#22c55e" opacity="0.1"/>
  <circle cx="656" cy="252" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="644" cy="252" r="3" fill="#22c55e" opacity="0.2"/>
  <circle cx="632" cy="252" r="3" fill="#22c55e" opacity="0.1"/>
</svg>
